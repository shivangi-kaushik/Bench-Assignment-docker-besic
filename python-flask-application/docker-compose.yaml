# Docker Compose version
version: '3.9'
# Each container/application is defined here.
services:

  web:

    # Build Docker image using Dockerfile
    # present in the current directory
    build: .

    container_name: flask-web

    # Port mapping
   
    ports:
      - "5001:5000"

  # Redis service
  redis:

    # Pull latest Redis image from Docker Hub
    image: redis:latest

    # Custom name for Redis container
    container_name: redis-server

    # Redis port mapping
    ports:
      - "6380:6379"